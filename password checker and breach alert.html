<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Security Checker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #252538;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #45475a;
            background: #11111b;
            color: #fff;
            font-size: 16px;
        }
        .meter {
            height: 10px;
            background: #45475a;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
        .alert-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .safe { background: #a6e3a1; color: #11111b; }
        .danger { background: #f38ba8; color: #11111b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Checker</h2>
    <input type="password" id="password" placeholder="Enter password to test..." oninput="checkPassword()">
    
    <div class="meter"><div id="bar" class="bar"></div></div>
    <div id="strengthText">Strength: Too Short</div>
    
    <div id="breachAlert" class="alert-box"></div>
</div>

<script>
    // 1. Password Strength Evaluation
    function checkPassword() {
        const password = document.getElementById('password').value;
        const bar = document.getElementById('bar');
        const text = document.getElementById('strengthText');
        
        let score = 0;
        if (password.length >= 8) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        const colors = ['#f38ba8', '#fab387', '#f9e2af', '#a6e3a1'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];

        if (password.length === 0) {
            bar.style.width = '0%';
            text.innerText = 'Strength: Too Short';
        } else {
            bar.style.width = (score * 25) + '%';
            bar.style.background = colors[score - 1] || colors[0];
            text.innerText = 'Strength: ' + (labels[score - 1] || 'Weak');
        }

        // Trigger breach check only when user pauses typing
        clearTimeout(window.searchTimeout);
        if (password.length > 3) {
            window.searchTimeout = setTimeout(() => checkBreach(password), 600);
        } else {
            document.getElementById('breachAlert').style.display = 'none';
        }
    }

    // 2. Safe Data Breach Lookup (K-Anonymity via SHA-1)
    async function checkBreach(password) {
        const alertBox = document.getElementById('breachAlert');
        
        // Hash password with SHA-1
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-1', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

        const prefix = hashHex.slice(0, 5);
        const suffix = hashHex.slice(5);

        try {
            // Query API using only the first 5 characters of the hash
            const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
            const text = await response.text();
            
            // Search the results for our matching suffix
            const lines = text.split('\n');
            let breachCount = 0;
            
            for (let line of lines) {
                const [partsSuffix, count] = line.split(':');
                if (partsSuffix.trim() === suffix) {
                    breachCount = parseInt(count);
                    break;
                }
            }

            alertBox.style.display = 'block';
            if (breachCount > 0) {
                alertBox.className = 'alert-box danger';
                alertBox.innerText = `⚠️ Exposed! Found in ${breachCount.toLocaleString()} breaches.`;
            } else {
                alertBox.className = 'alert-box safe';
                alertBox.innerText = '✅ Clean! No known breaches found.';
            }
        } catch (err) {
            console.error('API Error:', err);
        }
    }
</script>

</body>
</html>
